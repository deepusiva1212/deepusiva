<!DOCTYPE html>
<html>
<head>
    <title>My Profile | Deepu Siva</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; max-width: 450px; margin: 40px auto; }
        h2 { color: #4ade80; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 20px; }
        p { margin: 15px 0; font-size: 16px; }
        strong { color: #8b949e; width: 120px; display: inline-block; }
        .back-btn { color: #4ade80; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body style="display:none;" id="mainBody">
    <div class="card">
        <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
        <h2>Client Profile</h2>
        <p><strong>Company:</strong> <span id="prof-company">...</span></p>
        <p><strong>Full Name:</strong> <span id="prof-name">...</span></p>
        <p><strong>Mobile:</strong> <span id="prof-phone">...</span></p>
        <p><strong>Email:</strong> <span id="prof-email">...</span></p>
        <p style="font-size: 12px; margin-top: 30px; opacity: 0.6;"><strong>Last Login:</strong> <span id="prof-last">...</span></p>
        
        <button onclick="logout()" style="width: 100%; margin-top: 20px; padding: 12px; background: none; border: 1px solid #ff4d4d; color: #ff4d4d; border-radius: 6px; cursor: pointer;">Logout</button>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔑 THE CORRECTED MASTER KEY
        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 🛡️ THE PATIENT PROFILE BOUNCER ---
        onAuthStateChanged(auth, async (user) => {
            const bodyTag = document.getElementById('mainBody');

            if (user) {
                console.log("✅ Profile Session Found:", user.email);
                
                // (Optional) Fetch profile data here later
                
                // TURN ON THE LIGHTS
                if (bodyTag) bodyTag.style.display = "block";
                document.body.style.display = "block"; 

            } else {
                console.log("⏳ Waiting 6 seconds for Firebase to wake up...");
                
                // Give it a generous 6 seconds before redirecting
                setTimeout(() => {
                    if (!auth.currentUser) {
                        console.log("🚫 Still no user. Redirecting to login.");
                        window.location.href = "login.html";
                    } else {
                        console.log("🎉 Session found late! Unlocking Profile.");
                        if (bodyTag) bodyTag.style.display = "block";
                        document.body.style.display = "block";
                    }
                }, 6000); 
            }
        });
    </script>
</body>
</html>
