<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; }
        nav { background: #161b22; border-bottom: 2px solid #f97316; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Barlow Condensed', sans-serif; color: #f0f6fc; margin: 0; font-size: 20px; letter-spacing: 1px; }
        .profile-link { color: #f97316; text-decoration: none; font-weight: bold; border: 1px solid #f97316; padding: 5px 12px; border-radius: 4px; transition: 0.3s; }
        .profile-link:hover { background: #f97316; color: white; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .action-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 30px 20px; cursor: pointer; transition: 0.3s; }
        .action-card:hover { border-color: #f97316; transform: translateY(-5px); }
        .icon { font-size: 32px; display: block; margin-bottom: 10px; }
        .action-card span { font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
    </style>
</head>
<body style="display:none;" id="mainBody">

    <nav>
        <h1>DEEPU SIVA - CLIENT PORTAL</h1>
        <a href="profile.html" class="profile-link">👤 MY PROFILE</a>
    </nav>

    <div class="container">
        <h2>Welcome Back, <span id="userName">User</span>!</h2>
        <p>Select an option below to manage your projects and payments.</p>

        <div class="grid">
            <div class="action-card" onclick="location.href='my-bills.html'">
                <span class="icon">📄</span>
                <span>My Bills</span>
            </div>
            <div class="action-card" onclick="location.href='payments.html'">
                <span class="icon">💳</span>
                <span>Payments</span>
            </div>
            <div class="action-card" onclick="location.href='my-sites.html'">
                <span class="icon">🏗️</span>
                <span>Site Locations</span>
            </div>
            <div class="action-card" onclick="location.href='updates.html'">
                <span class="icon">🛡️</span>
                <span>Site Updates</span>
            </div>
        </div>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJ16mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 🛡️ THE ULTIMATE LOOP KILLER ---
        onAuthStateChanged(auth, async (user) => {
            const mainBody = document.getElementById('mainBody');
            
            if (user) {
                console.log("✅ User Found:", user.email);
                
                try {
                    const userRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(userRef);

                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        
                        // 1. Set the Welcome Name
                        const nameSpan = document.getElementById('userName');
                        if (nameSpan) nameSpan.innerText = userData.firstName || "Client";
                        
                        console.log("📂 Firestore Status:", userData.status);
                    }
                    
                    // 2. TURN ON THE LIGHTS (Force show the page)
                    if (mainBody) mainBody.style.display = "block";
                    document.body.style.display = "block"; 
                    
                } catch (err) {
                    console.error("❌ Database Error:", err);
                    document.body.style.display = "block";
                }

            } else {
                console.log("⏳ Checking login session... please wait.");
                
                // 🛑 SAFETY TIMER: Wait 5 seconds before kicking you out
                setTimeout(() => {
                    if (!auth.currentUser) {
                        console.log("🚫 No user found. Redirecting to login.html");
                        window.location.href = "login.html";
                    } else {
                        console.log("🎉 User detected late! Staying on dashboard.");
                        if (mainBody) mainBody.style.display = "block";
                    }
                }, 5000); 
            }
        });

        // Logout Logic
        window.logout = () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        };
    </script>
</body>
</html>
