<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile | Deepu Siva Portal</title>
<link rel="stylesheet" href="style.css"/>
<style>
#auth-overlay{position:fixed;inset:0;background:var(--white);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:44px;height:44px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#auth-overlay p{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

.portal-header{background:var(--white);border-bottom:3px solid var(--green);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(22,163,74,.08);}
.portal-header h1{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--green3);text-transform:uppercase;margin:0;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:14px;font-weight:600;text-decoration:none;}

.page-body{max-width:600px;margin:0 auto;padding:28px 24px 100px;}

/* Avatar section */
.avatar-block{text-align:center;margin-bottom:32px;}
.avatar-ring{width:88px;height:88px;border-radius:50%;background:linear-gradient(150deg,var(--green3),var(--green));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 24px rgba(22,163,74,.25);}
.avatar-initials{font-family:var(--font-head);font-size:36px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:1px;}
.avatar-name{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text);text-transform:uppercase;}
.avatar-email{font-size:14px;color:var(--muted);margin-top:4px;}
.account-badge{display:inline-block;margin-top:10px;background:var(--green-light);color:var(--green3);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 14px;border-radius:20px;}

/* Profile card */
.profile-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;}
.profile-card h3{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.profile-field{display:flex;flex-direction:column;margin-bottom:18px;}
.profile-field:last-child{margin-bottom:0;}
.profile-field label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.profile-field .val{font-size:15px;font-weight:600;color:var(--text2);}

/* Edit mode */
.edit-field{display:none;margin-top:6px;}
.edit-mode .edit-field{display:block;}
.edit-mode .val{display:none;}
.edit-field input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;outline:none;transition:.2s;}
.edit-field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1);}

/* Edit toggle button */
.btn-edit{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:10px 20px;border-radius:var(--radius);font-family:var(--font-head);font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.btn-edit:hover{border-color:var(--green);color:var(--green3);}
.btn-save{background:var(--green);border:none;color:#fff;padding:10px 24px;border-radius:var(--radius);font-family:var(--font-head);font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:.2s;letter-spacing:.5px;display:none;}
.btn-save:hover{background:var(--green2);}
.edit-mode .btn-edit{display:none;}
.edit-mode .btn-save{display:inline-block;}

/* Last login */
.meta-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;}
.meta-row svg{color:var(--green);flex-shrink:0;}
.meta-row p{font-size:13px;color:var(--muted);}
.meta-row strong{color:var(--text2);font-weight:600;}

/* Logout button */
.btn-logout-full{width:100%;background:none;border:1px solid rgba(239,68,68,.3);color:var(--red);padding:13px;border-radius:var(--radius);font-family:var(--font-head);font-size:15px;font-weight:700;text-transform:uppercase;cursor:pointer;letter-spacing:.5px;transition:.2s;margin-top:8px;}
.btn-logout-full:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* Toast */
.p-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green3);color:#fff;padding:12px 24px;border-radius:var(--radius);font-weight:600;font-size:14px;z-index:9999;opacity:0;transition:.35s;white-space:nowrap;pointer-events:none;}
.p-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.p-toast.err{background:var(--red);}
</style>
</head>
<body>

<div id="auth-overlay"><div class="spinner"></div><p>Verifying session…</p></div>

<header class="portal-header">
  <h1>My Profile</h1>
  <a href="dashboard.html" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
</header>

<div class="page-body">

  <!-- AVATAR -->
  <div class="avatar-block">
    <div class="avatar-ring"><div class="avatar-initials" id="avatarInitials">—</div></div>
    <div class="avatar-name" id="displayName">Loading…</div>
    <div class="avatar-email" id="displayEmail">—</div>
    <span class="account-badge">Project Client</span>
  </div>

  <!-- LAST LOGIN -->
  <div class="meta-row">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <p>Last sign-in: <strong id="lastLogin">—</strong></p>
  </div>

  <!-- PROFILE DETAILS -->
  <div class="profile-card" id="profileCard">
    <h3>
      Account Details
      <button class="btn-edit" id="editBtn" onclick="toggleEdit()" style="float:right;">Edit</button>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()" style="float:right;">Save Changes</button>
    </h3>

    <div class="profile-field">
      <label>Full Name</label>
      <span class="val" id="f-name">—</span>
      <div class="edit-field"><input type="text" id="e-name" placeholder="Your full name"/></div>
    </div>
    <div class="profile-field">
      <label>Company / Organisation</label>
      <span class="val" id="f-company">—</span>
      <div class="edit-field"><input type="text" id="e-company" placeholder="Company name"/></div>
    </div>
    <div class="profile-field">
      <label>Mobile Number</label>
      <span class="val" id="f-phone">—</span>
      <div class="edit-field"><input type="tel" id="e-phone" placeholder="+91 XXXXX XXXXX"/></div>
    </div>
    <div class="profile-field">
      <label>Email Address</label>
      <span class="val" id="f-email">—</span>
      <!-- Email is from Firebase Auth — not editable here -->
    </div>
    <div class="profile-field">
      <label>Account Status</label>
      <span class="val" id="f-status" style="color:var(--green);font-weight:700;">—</span>
    </div>
  </div>

  <!-- LOGOUT -->
  <button class="btn-logout-full" onclick="doLogout()">Sign Out of Portal</button>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="app-bottom-nav">
  <a href="index.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Home</span></a>
  <a href="my-bills.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span>Bills</span></a>
  <a href="dashboard.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span><span>Dashboard</span></a>
  <a href="profile.html" class="nav-tab active"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Profile</span></a>
</nav>

<div class="p-toast" id="pToast"></div>

<script type="module">
import { auth, db, requireAuth } from './ds-firebase.js';
import { signOut }  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

let currentUser = null;

requireAuth(async (user) => {
  currentUser = user;

  // Last login
  const lastLogin = user.metadata.lastSignInTime
    ? new Date(user.metadata.lastSignInTime).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})
    : 'First login';
  document.getElementById('lastLogin').textContent = lastLogin;
  document.getElementById('displayEmail').textContent = user.email;

  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    const d    = snap.exists() ? snap.data() : {};

    const name    = d.name || d.fullName || user.email.split('@')[0];
    const company = d.company || d.companyName || 'Not set';
    const phone   = d.phone || d.mobile || 'Not set';
    const status  = d.status === 'approved' ? 'Active & Approved'
                  : d.status === 'pending'  ? 'Pending Approval'
                  : 'Active';

    // Avatar initials (first letter of each word)
    const initials = name.split(' ').map(w => w[0]||'').join('').substring(0,2).toUpperCase();
    document.getElementById('avatarInitials').textContent = initials || '?';
    document.getElementById('displayName').textContent    = name;

    // Fill view fields
    document.getElementById('f-name').textContent    = name;
    document.getElementById('f-company').textContent  = company;
    document.getElementById('f-phone').textContent    = phone;
    document.getElementById('f-email').textContent    = user.email;
    document.getElementById('f-status').textContent   = status;
    document.getElementById('f-status').style.color   = d.status === 'approved' ? 'var(--green)' : 'var(--amber)';

    // Pre-fill edit fields
    document.getElementById('e-name').value    = name    !== 'Not set' ? name    : '';
    document.getElementById('e-company').value = company !== 'Not set' ? company : '';
    document.getElementById('e-phone').value   = phone   !== 'Not set' ? phone   : '';

  } catch(e) {
    document.getElementById('f-name').textContent  = user.email.split('@')[0];
    document.getElementById('f-email').textContent = user.email;
    document.getElementById('f-status').textContent = 'Active';
  }
});

// ── TOGGLE EDIT MODE ──
window.toggleEdit = function() {
  document.getElementById('profileCard').classList.toggle('edit-mode');
};

// ── SAVE PROFILE ──
window.saveProfile = async function() {
  if (!currentUser) return;
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const newName    = document.getElementById('e-name').value.trim();
    const newCompany = document.getElementById('e-company').value.trim();
    const newPhone   = document.getElementById('e-phone').value.trim();

    await updateDoc(doc(db, 'users', currentUser.uid), {
      name:        newName,
      fullName:    newName,
      company:     newCompany,
      companyName: newCompany,
      phone:       newPhone,
      mobile:      newPhone,
    });

    // Update view
    document.getElementById('f-name').textContent    = newName    || '—';
    document.getElementById('f-company').textContent = newCompany || '—';
    document.getElementById('f-phone').textContent   = newPhone   || '—';
    document.getElementById('displayName').textContent = newName  || '—';
    const initials = newName.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
    document.getElementById('avatarInitials').textContent = initials || '?';

    document.getElementById('profileCard').classList.remove('edit-mode');
    showToast('Profile updated successfully!');
  } catch(e) {
    showToast('Error saving profile. Try again.', true);
  } finally {
    btn.textContent = 'Save Changes'; btn.disabled = false;
  }
};

// ── LOGOUT ──
window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

// ── TOAST ──
function showToast(msg, isErr = false) {
  const t = document.getElementById('pToast');
  t.textContent = msg;
  t.className = 'p-toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
