<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payments | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin: 0; font-size: 24px; }
        .back-link { color: #f97316; text-decoration: none; font-weight: bold; }
        
        .payment-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; position: relative; }
        .payment-date { font-size: 12px; color: #8b949e; position: absolute; top: 20px; right: 20px; }
        .payment-title { color: #4ade80; font-size: 18px; font-weight: bold; margin-bottom: 5px; display: block; }
        .payment-detail { font-size: 22px; color: #fff; display: block; margin-top: 10px; }
        
        .empty-msg { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body style="display:none;" id="mainBody">

    <div class="container">
        <div class="header">
            <h1>PAYMENT BALANCE</h1>
            <a href="dashboard.html" class="back-link">← BACK</a>
        </div>

        <div id="paymentList">
            </div>

        <div id="noPayments" class="empty-msg" style="display:none;">
            <p>No payment records found. Contact the Director for details.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJ16mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const payments = data.payments || [];
                    const listContainer = document.getElementById('paymentList');

                    if (payments.length === 0) {
                        document.getElementById('noPayments').style.display = "block";
                    } else {
                        // Sort by newest first
                        payments.reverse().forEach(pay => {
                            const card = document.createElement('div');
                            card.className = 'payment-card';
                            card.innerHTML = `
                                <span class="payment-date">${pay.date}</span>
                                <span class="payment-title">${pay.title}</span>
                                <span class="payment-detail">${pay.detail}</span>
                            `;
                            listContainer.appendChild(card);
                        });
                    }
                    document.getElementById('mainBody').style.display = "block";
                }
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
