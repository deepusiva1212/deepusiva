<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Approval | Deepu Siva</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
     body { display: none; font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 20px; margin-bottom: 30px; }
    h1 { font-family: 'Barlow Condensed', sans-serif; color: #f0f6fc; margin: 0; }
    .user-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .user-info h3 { margin: 0; color: #f97316; }
    .user-info p { margin: 5px 0; font-size: 14px; color: #8b949e; }
    .approve-btn { background: #4ade80; color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .approve-btn:hover { background: #22c55e; }
    .status-tag { font-size: 12px; padding: 3px 8px; border-radius: 10px; background: #30363d; color: #f97316; }
  </style>
</head>
<body>
  <div id="vaultDoor" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 999; flex-direction: column; align-items: center; justify-content: center;">
    <h2 style="color: #f97316; margin-bottom: 20px;">DIRECTOR CLEARANCE REQUIRED</h2>
    <input type="text" id="adminId" placeholder="Admin ID" style="margin-bottom: 15px; padding: 12px; border-radius: 5px; border: 1px solid #30363d; background: #161b22; color: white; width: 250px;">
    <input type="password" id="adminPass" placeholder="Master Password" style="margin-bottom: 20px; padding: 12px; border-radius: 5px; border: 1px solid #30363d; background: #161b22; color: white; width: 250px;">
    <button id="unlockBtn" style="padding: 12px 20px; background: #4ade80; color: black; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; width: 275px;">UNLOCK PORTAL</button>
  </div>

  <div class="header">
    <h1>PENDING APPROVALS</h1>
    <a href="index.html" style="color: #8b949e; text-decoration: none;">Logout</a>
  </div>

  <div id="userList">Loading pending applications...</div>
<div class="card" style="margin-top: 30px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #30363d;">
    <h2 style="color: #f97316;">Director Control Panel</h2>
    <p style="color: #8b949e;">Select a client to update their dashboard details.</p>

    <label style="color: white; display: block; margin-top: 15px;">Step 1: Select Approved Client</label>
    <select id="clientSelect" style="width: 100%; padding: 12px; margin-top: 5px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px;">
        <option value="">-- Choose a Client --</option>
    </select>

    <label style="color: white; display: block; margin-top: 15px;">Title / Description</label>
    <input type="text" id="updateTitle" placeholder="e.g., Invoice #102 or Site B Status" style="width: 100%; padding: 12px; margin-top: 5px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px;">

    <label style="color: white; display: block; margin-top: 15px;">Detail / Value / Link</label>
    <textarea id="updateDetail" placeholder="Enter amount, status text, or Google Maps URL" style="width: 100%; padding: 12px; margin-top: 5px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; height: 80px;"></textarea>

    <button id="pushBtn" style="width: 100%; margin-top: 20px; padding: 15px; background: #238636; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;">
        🚀 PUSH TO CLIENT DASHBOARD
    </button>
</div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, getDoc, updateDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0", // ✅ Corrected API Key
      authDomain: "deepu-siva-portal.firebaseapp.com",
      projectId: "deepu-siva-portal",
      storageBucket: "deepu-siva-portal.firebasestorage.app",
      messagingSenderId: "1014351018202",
      appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔒 THE MASTER ADMIN LIST
    const adminEmails = [
      "deepadharsan.rajavel@gmail.com",
      "deepusiva.pvt@gmail.com",
      "contact@deepusiva.com",
      "deepusiva2017@gmail.com"
    ];

    // 🔐 SMART SECURITY CHECK & VAULT DOOR
onAuthStateChanged(auth, async (user) => {
    if (user) {
        // 1. Fetch your role from the Firestore 'users' collection
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        const userData = userSnap.exists() ? userSnap.data() : {};

        // 2. Check: Is the email in the Master List OR is the role 'admin'?
        const isMasterEmail = adminEmails.map(e => e.toLowerCase()).includes(user.email.toLowerCase());
        const isAdminRole = (userData.role === 'admin');

        if (isMasterEmail || isAdminRole) {
            console.log("✅ Access Granted to Director");
            document.body.style.display = "block";
            document.getElementById('vaultDoor').style.display = "flex";
            
            // Once authorized, load your management tools
            loadPendingUsers();
            loadClientDropdown();
        } else {
            console.warn("❌ Unauthorized Email:", user.email);
            alert("SECURITY ALERT: Access Denied.");
            window.location.href = "index.html";
        }
    } else {
        // Not logged in at all? Back to login page.
        window.location.href = "login.html";
    }
});

    // 🗝️ VAULT DOOR UNLOCK
    document.getElementById('unlockBtn').addEventListener('click', () => {
      const enteredId = document.getElementById('adminId').value;
      const enteredPass = document.getElementById('adminPass').value;
      if (enteredId === "DEEPU_ADMIN" && enteredPass === "Director@2026") {
        document.getElementById('vaultDoor').style.display = "none";
      } else {
        alert("ACCESS DENIED: Incorrect Admin ID or Password.");
      }
    });

    // --- 1. THE "SMART" DROPDOWN (For sending Bills/Updates) ---
    async function loadClientDropdown() {
        const clientSelect = document.getElementById('clientSelect');
        if (!clientSelect) return;
        clientSelect.innerHTML = '<option value="">-- Choose a Client --</option>';

        const querySnapshot = await getDocs(collection(db, "users"));
        querySnapshot.forEach((doc) => {
            const user = doc.data();
            const option = document.createElement('option');
            // We use email as the ID so we can send data to them correctly
            option.value = user.email; 
            // This shows: Full Name (Email) - Company
            option.innerText = `${user.fullName || user.firstName} (${user.email}) — ${user.company || 'Individual'}`;
            clientSelect.appendChild(option);
        });
    }

    // --- 2. THE PENDING APPROVAL LIST (For new signups) ---
    async function loadPendingUsers() {
      const userList = document.getElementById('userList');
      userList.innerHTML = "";
      const q = query(collection(db, "users"), where("status", "==", "pending"));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        userList.innerHTML = "<p>No pending applications.</p>";
        return;
      }

      querySnapshot.forEach((userDoc) => {
        const data = userDoc.data();
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="user-info">
            <h3>${data.firstName} ${data.lastName} <span class="status-tag">${data.username}</span></h3>
            <p><strong>Email:</strong> ${data.email} | <strong>Company:</strong> ${data.company || 'N/A'}</p>
          </div>
          <button class="approve-btn" onclick="approveUser('${userDoc.id}')">Approve Access</button>
        `;
        userList.appendChild(card);
      });
    }

    window.approveUser = async (uid) => {
      if(confirm("Allow this client to access the dashboard?")) {
        await updateDoc(doc(db, "users", uid), { status: "approved" });
        alert("Client Approved!");
        loadPendingUsers(); 
        loadClientDropdown(); // Refresh dropdown so they appear there too
      }
    };

    // --- 📤 THE PUSH BUTTON LOGIC ---
document.getElementById('pushBtn').addEventListener('click', async () => {
    const selectedEmail = document.getElementById('clientSelect').value;
    const title = document.getElementById('updateTitle').value;
    const detail = document.getElementById('updateDetail').value;

    if (!selectedEmail || !title) {
        alert("Please select a client and enter a title.");
        return;
    }

    // 💡 THE GROUP FEATURE POPUP:
    const isGroup = confirm("Push this to the ENTIRE COMPANY instead of just this one email?");

    try {
        await addDoc(collection(db, "updates"), {
            title: title,
            detail: detail,
            targetEmail: isGroup ? null : selectedEmail,
            targetCompany: isGroup ? "RAJA DEEPU SOORIYA PVT LTD" : null, 
            timestamp: new Date(),
            type: isGroup ? "group" : "private"
        });
        alert("✅ Dashboard Updated Successfully!");
        
        // Clear fields for the next one
        document.getElementById('updateTitle').value = "";
        document.getElementById('updateDetail').value = "";
    } catch (e) {
        alert("Error: " + e.message);
    }
});
</script>
</body>
</html>
