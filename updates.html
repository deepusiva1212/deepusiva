<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Updates | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin: 0; font-size: 24px; }
        .back-link { color: #f97316; text-decoration: none; font-weight: bold; }
        
        .update-card { background: #161b22; border-left: 4px solid #f97316; border-radius: 4px; padding: 20px; margin-bottom: 20px; position: relative; }
        .update-date { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .update-title { color: #fff; font-size: 18px; font-weight: bold; display: block; margin: 5px 0 10px 0; }
        .update-detail { font-size: 15px; color: #c9d1d9; line-height: 1.5; }
        
        .empty-msg { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body style="display:none;" id="mainBody">

    <div class="container">
        <div class="header">
            <h1>PROJECT UPDATES</h1>
            <a href="dashboard.html" class="back-link">← BACK</a>
        </div>

        <div id="updateFeed">
            </div>

        <div id="noUpdates" class="empty-msg" style="display:none;">
            <p>No project updates posted yet. Check back soon!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJ16mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const updates = data.updates || [];
                    const feed = document.getElementById('updateFeed');

                    if (updates.length === 0) {
                        document.getElementById('noUpdates').style.display = "block";
                    } else {
                        // Show newest updates at the top
                        updates.reverse().forEach(upd => {
                            const card = document.createElement('div');
                            card.className = 'update-card';
                            card.innerHTML = `
                                <div class="update-date">${upd.date}</div>
                                <span class="update-title">${upd.title}</span>
                                <div class="update-detail">${upd.detail}</div>
                            `;
                            feed.appendChild(card);
                        });
                    }
                    document.getElementById('mainBody').style.display = "block";
                }
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
