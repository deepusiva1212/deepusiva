<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Approval | Deepu Siva</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 20px; margin-bottom: 30px; }
    h1 { font-family: 'Barlow Condensed', sans-serif; color: #f0f6fc; margin: 0; }
    .user-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .user-info h3 { margin: 0; color: #f97316; }
    .user-info p { margin: 5px 0; font-size: 14px; color: #8b949e; }
    .approve-btn { background: #4ade80; color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .approve-btn:hover { background: #22c55e; }
    .status-tag { font-size: 12px; padding: 3px 8px; border-radius: 10px; background: #30363d; color: #f97316; }
  </style>
</head>
<body>

  <div class="header">
    <h1>PENDING APPROVALS</h1>
    <a href="index.html" style="color: #8b949e; text-decoration: none;">Logout</a>
  </div>

  <div id="userList">Loading pending applications...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0",
      authDomain: "deepu-siva-portal.firebaseapp.com",
      projectId: "deepu-siva-portal",
      storageBucket: "deepu-siva-portal.firebasestorage.app",
      messagingSenderId: "1014351018202",
      appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadUsers() {
      const userList = document.getElementById('userList');
      userList.innerHTML = "";
      
      // Look for anyone with status 'pending'
      const q = query(collection(db, "users"), where("status", "==", "pending"));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        userList.innerHTML = "<p>No pending applications at the moment.</p>";
        return;
      }

      querySnapshot.forEach((userDoc) => {
        const data = userDoc.data();
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="user-info">
            <h3>${data.firstName} ${data.lastName} <span class="status-tag">${data.username}</span></h3>
            <p><strong>Email:</strong> ${data.email} | <strong>Phone:</strong> ${data.phone}</p>
            <p><strong>Location:</strong> ${data.city}, ${data.state} (${data.pincode})</p>
            <p><strong>Address:</strong> ${data.address}</p>
          </div>
          <button class="approve-btn" onclick="approveUser('${userDoc.id}')">Approve Access</button>
        `;
        userList.appendChild(card);
      });
    }

    window.approveUser = async (uid) => {
      if(confirm("Allow this client to access the dashboard?")) {
        await updateDoc(doc(db, "users", uid), { status: "approved" });
        alert("Client Approved!");
        loadUsers(); // Refresh the list
      }
    };

    loadUsers();
  </script>
</body>
</html>
