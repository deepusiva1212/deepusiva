<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Bills | Deepu Siva Portal</title>
<link rel="stylesheet" href="style.css"/>
<style>
#auth-overlay{position:fixed;inset:0;background:var(--white);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:44px;height:44px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#auth-overlay p{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.portal-header{background:var(--white);border-bottom:3px solid var(--green);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(22,163,74,.08);}
.portal-header h1{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--green3);text-transform:uppercase;margin:0;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:14px;font-weight:600;text-decoration:none;}
.page-body{max-width:700px;margin:0 auto;padding:28px 24px 100px;}
.bill-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;transition:.2s;}
.bill-card:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(22,163,74,.1);}
.bill-date{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.bill-title{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--text);text-transform:uppercase;display:block;margin:6px 0 8px;}
.bill-detail{font-size:14px;color:var(--muted);line-height:1.6;}
.bill-amount{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--green);margin-top:10px;display:block;}
.download-btn{display:inline-flex;align-items:center;gap:8px;background:var(--green-light);color:var(--green3);border:1px solid rgba(22,163,74,.2);padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;text-decoration:none;margin-top:12px;transition:.2s;}
.download-btn:hover{background:var(--green);color:#fff;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state svg{opacity:.3;margin-bottom:12px;}
.empty-state p{font-size:15px;}
.section-tag-sm{display:inline-block;background:var(--green-light);color:var(--green3);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:20px;}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="spinner"></div>
  <p>Verifying session…</p>
</div>

<header class="portal-header">
  <h1>My Bills & Invoices</h1>
  <a href="dashboard.html" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
</header>

<div class="page-body">
  <span class="section-tag-sm">Your Documents</span>
  <div id="billList"></div>
  <div id="noBills" class="empty-state" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <p>No invoices or bills found yet.<br/>Your project manager will upload them here.</p>
  </div>
</div>

<nav class="app-bottom-nav">
  <a href="index.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Home</span></a>
  <a href="my-bills.html" class="nav-tab active"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span>Bills</span></a>
  <a href="dashboard.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span><span>Dashboard</span></a>
  <a href="updates.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></span><span>Updates</span></a>
</nav>

<script type="module">
import { db, requireAuth } from './ds-firebase.js';
import { collection, query, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

requireAuth((user) => {
  const list = document.getElementById('billList');
  const empty = document.getElementById('noBills');

  const q = query(
    collection(db, 'users', user.uid, 'invoices'),
    orderBy('timestamp', 'desc')
  );

  onSnapshot(q, (snap) => {
    if (snap.empty) {
      empty.style.display = 'block';
      list.innerHTML = '';
      return;
    }
    empty.style.display = 'none';
    list.innerHTML = snap.docs.map(d => {
      const b = d.data();
      const date = b.timestamp ? b.timestamp.toDate().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : 'Pending';
      return `
        <div class="bill-card">
          <div class="bill-date">${date}</div>
          <span class="bill-title">${b.title || 'Invoice'}</span>
          <div class="bill-detail">${b.detail || ''}</div>
          ${b.amount ? `<span class="bill-amount">₹${Number(b.amount).toLocaleString('en-IN')}</span>` : ''}
          ${b.billUrl
            ? `<a href="${b.billUrl}" target="_blank" class="download-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
               </a>`
            : `<span style="font-size:12px;color:var(--muted);margin-top:8px;display:block;">No PDF attached yet</span>`
          }
        </div>`;
    }).join('');
  }, (err) => {
    list.innerHTML = '<p style="color:var(--red);padding:20px;">Error loading bills. Please refresh.</p>';
  });
});
</script>
</body>
</html>
