<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login | Deepu Siva</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #161b22; padding: 40px; border-radius: 8px; border: 1px solid #21262d; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h2 { font-family: 'Barlow Condensed', sans-serif; color: #f0f6fc; font-size: 32px; margin-bottom: 24px; letter-spacing: 1px; }
    input { width: 100%; padding: 14px; margin-bottom: 16px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
    input:focus { outline: none; border-color: #f97316; }
    button { width: 100%; padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #ea580c; }
    .back-link { display: block; margin-top: 10px; color: #8b949e; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #c9d1d9; }
    #errorMessage { color: #ff4d4d; margin-top: 15px; font-size: 14px; display: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>CLIENT LOGIN</h2>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" id="loginBtn">Sign In to Dashboard</button>
      <div id="errorMessage"></div>
    </form>

    <a href="register.html" class="back-link" style="color: #f97316; margin-top: 20px;">Create an Account</a>
    <a href="index.html" class="back-link">← Back to Main Website</a>
  </div>

  <script type="module">
        // 1. IMPORT PERSISTENCE TOOLS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            setPersistence, 
            browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 🔑 YOUR MASTER CONFIG
       // 🔑 THE CORRECT MASTER CONFIG
        const firebaseConfig = {
    apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0", 
    authDomain: "deepu-siva-portal.firebaseapp.com",
    projectId: "deepu-siva-portal",
    storageBucket: "deepu-siva-portal.firebasestorage.app",
    messagingSenderId: "1014351018202",
    appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 📧 THE "STICKY" LOGIN LOGIC ---
        document.getElementById('loginBtn').addEventListener('click', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.innerText = "Connecting...";
            errorMsg.style.display = "block";

            // 🛡️ STEP A: Tell the browser to "Remember" this session
            setPersistence(auth, browserLocalPersistence)
                .then(() => {
                    // 🔑 STEP B: Now perform the actual login
                    return signInWithEmailAndPassword(auth, email, pass);
                })
                .then(() => {
                    console.log("✅ Persistence set and Login successful!");
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    console.error("Login Error:", error.code);
                    errorMsg.style.color = "#ff4d4d";
                    errorMsg.innerText = "Invalid login. (Error: " + error.code + ")";
                });
        });
    </script>
</body>
</html>
