<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invoices | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin: 0; font-size: 24px; }
        .back-link { color: #f97316; text-decoration: none; font-weight: bold; }
        
        .bill-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bill-info { flex-grow: 1; }
        .bill-date { font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .bill-title { color: #fff; font-size: 18px; font-weight: bold; display: block; margin: 5px 0; }
        .bill-amount { font-size: 16px; color: #4ade80; font-weight: bold; }
        
        .status-badge { background: #238636; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .empty-msg { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body>
<div id="auth-check-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:'Barlow', sans-serif;">
        <div style="border: 4px solid #f97316; border-top: 4px solid transparent; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">VERIFYING ACCESS...</p>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <div class="container">
        <div class="header">
            <h1>MY INVOICES</h1>
            <a href="dashboard.html" class="back-link">← BACK</a>
        </div>

        <div id="billList">
            </div>

        <div id="noBills" class="empty-msg" style="display:none;">
            <p>No invoices found in your record.</p>
        </div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyCm0UFXGcDiXk8dmGZ8coKOnnVmaJl6mB0", 
    authDomain: "deepu-siva-portal.firebaseapp.com",
    projectId: "deepu-siva-portal",
    storageBucket: "deepu-siva-portal.firebasestorage.app",
    messagingSenderId: "1014351018202",
    appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

  // 🕵️‍♂️ 1. THE SECURITY WATCHER
   // 🕵️‍♂️ THE VERIFIER
    let authTimer; // ⏱️ This timer waits for the "ID Card" to load

    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('auth-check-overlay');
        
        if (user) {
            console.log("✅ Verified User:", user.email);
            clearTimeout(authTimer); // 🛑 STOP the logout order immediately
            if(overlay) overlay.style.display = 'none';
            loadMyBills(user.uid);
        } else {
            // Start the countdown, but give it 4 seconds
            authTimer = setTimeout(() => {
                if (!auth.currentUser) {
                    console.log("❌ No session found, redirecting to login...");
                    window.location.href = "login.html";
                }
            }, 4000); 
        }
    });
    // 📋 2. LOAD BILLS FROM THE PRIVATE FOLDER
    function loadMyBills(userId) {
        const billContainer = document.getElementById('billList'); // Ensure you have a div with this ID
        
        // This looks in users > {YourID} > invoices (Exactly where the Director pushes)
        const q = query(
            collection(db, "users", userId, "invoices"), 
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                billContainer.innerHTML = "<p style='text-align:center;'>No bills or invoices found yet.</p>";
                return;
            }

            let html = "";
            snapshot.forEach((doc) => {
                const bill = doc.data();
                const date = bill.timestamp ? bill.timestamp.toDate().toLocaleDateString() : "Pending";
                
                // 🎨 This draws the bill card
                html += `
                    <div style="background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; margin-bottom: 15px;">
                        <h3 style="color: #f97316; margin-top: 0;">${bill.title}</h3>
                        <p style="color: #8b949e; font-size: 14px;">Date: ${date}</p>
                        <p style="color: white;">${bill.detail}</p>
                        
                        ${bill.billUrl ? 
                            `<a href="${bill.billUrl}" target="_blank" style="display:inline-block; margin-top:10px; color:#4ade80; text-decoration:none; font-weight:bold;">📥 Download PDF Bill</a>` : 
                            `<span style="color:#8b949e; font-size:12px;">(No PDF Attached)</span>`
                        }
                    </div>
                `;
            });
            billContainer.innerHTML = html;
        });
    }
    </script>
</body>
</html>
