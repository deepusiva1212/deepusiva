<link rel="stylesheet" href="style.css"/>
<style>
/* ── PROJECT DETAIL PAGE ── */
.proj-hero{background:linear-gradient(150deg,var(--green-pale),#e8f5e9);border-bottom:1px solid var(--border);padding:48px 24px 40px;position:relative;overflow:hidden;}
.proj-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;background:rgba(22,163,74,.06);border-radius:50%;}
.proj-breadcrumb{font-size:13px;color:var(--muted);margin-bottom:14px;}
.proj-breadcrumb a{color:var(--green);text-decoration:none;font-weight:600;}
.proj-breadcrumb a:hover{text-decoration:underline;}
.proj-cat-tag{display:inline-block;background:var(--green-light);color:var(--green3);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.proj-hero h1{font-family:var(--font-head);font-size:clamp(28px,5vw,52px);font-weight:800;color:var(--green3);text-transform:uppercase;letter-spacing:1px;line-height:1.1;position:relative;z-index:1;}

.proj-body{max-width:1100px;margin:0 auto;padding:48px 24px 80px;}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:flex-start;}

/* Main image */
.proj-main-img{width:100%;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:0 8px 32px rgba(22,163,74,.1);object-fit:cover;max-height:420px;}
.proj-img-placeholder{width:100%;height:360px;background:var(--green-pale);border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--green3);}
.proj-img-placeholder svg{opacity:.4;}
.proj-img-placeholder p{font-size:13px;color:var(--muted);}

/* Content side */
.proj-content-side{}
.proj-section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.proj-desc{font-size:16px;line-height:1.8;color:var(--text2);margin-bottom:28px;}

/* Meta tags */
.proj-meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px;}
.proj-meta-chip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;}
.proj-meta-chip strong{color:var(--green3);}

/* CTA */
.proj-cta-box{background:var(--green);border-radius:var(--radius-lg);padding:24px;color:#fff;margin-top:8px;}
.proj-cta-box h4{font-family:var(--font-head);font-size:20px;font-weight:800;text-transform:uppercase;margin-bottom:6px;}
.proj-cta-box p{font-size:14px;opacity:.85;margin-bottom:16px;}
.proj-cta-btns{display:flex;gap:10px;flex-wrap:wrap;}
.proj-cta-btn{background:#fff;color:var(--green3);padding:11px 20px;border-radius:var(--radius);font-family:var(--font-head);font-size:14px;font-weight:700;text-decoration:none;transition:.2s;border:none;cursor:pointer;}
.proj-cta-btn:hover{background:var(--green-pale);}
.proj-cta-btn-outline{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);}

/* MORE PROJECTS */
.more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px;}
.more-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;text-decoration:none;display:block;transition:.2s;}
.more-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 8px 24px rgba(22,163,74,.12);}
.more-thumb{height:120px;background:var(--green-pale);display:flex;align-items:center;justify-content:center;color:var(--green3);overflow:hidden;}
.more-thumb img{width:100%;height:100%;object-fit:cover;}
.more-info{padding:14px;}
.more-cat{font-size:10px;color:var(--green);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.more-title{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text);margin-top:3px;text-transform:uppercase;line-height:1.2;}

/* Loading / Error */
.page-state{text-align:center;padding:80px 24px;color:var(--muted);}
.page-state svg{opacity:.3;margin-bottom:16px;}
.spinner{width:44px;height:44px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .proj-grid{grid-template-columns:1fr;}
  .more-grid{grid-template-columns:repeat(2,1fr);}
  .proj-body{padding:28px 16px 100px;}
}
</style>
</head>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit, where }
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0",
  authDomain:        "deepu-siva-portal.firebaseapp.com",
  projectId:         "deepu-siva-portal",
  storageBucket:     "deepu-siva-portal.firebasestorage.app",
  messagingSenderId: "1014351018202",
  appId:             "1:1014351018202:web:16d2578f726159e5ef8de3"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── GET PROJECT ID FROM URL ──
const params = new URLSearchParams(window.location.search);
const projectId = params.get('id');

if (!projectId) {
  showError('No project ID found. Please go back to the home page.');
} else {
  loadProject(projectId);
}

async function loadProject(id) {
  try {
    const snap = await getDoc(doc(db, 'portfolio', id));
    if (!snap.exists()) { showError('Project not found.'); return; }

    const p = snap.data();

    // ── UPDATE PAGE TITLE & META ──
    document.title = `${p.title} | Deepu Siva Pvt Ltd`;

    // ── BUILD HERO ──
    document.getElementById('projHero').innerHTML = `
      <div style="max-width:1100px;margin:0 auto;">
        <div class="proj-breadcrumb">
          <a href="index.html">Home</a> &nbsp;›&nbsp;
          <a href="index.html#projects">Projects</a> &nbsp;›&nbsp;
          ${p.title}
        </div>
        <span class="proj-cat-tag">${p.category || 'Project'}</span>
        <h1>${p.title}</h1>
      </div>`;

    // ── BUILD IMAGE SIDE ──
    const imgSide = document.getElementById('projImageSide');
    if (p.imageUrl) {
      imgSide.innerHTML = `<img src="${p.imageUrl}" alt="${p.title}" class="proj-main-img"/>`;
    } else {
      imgSide.innerHTML = `
        <div class="proj-img-placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Project photo coming soon</p>
        </div>`;
    }

    // ── BUILD CONTENT SIDE ──
    document.getElementById('projContentSide').innerHTML = `
      <div class="proj-section-label">About This Project</div>
      <div class="proj-desc">${p.fullDesc || p.shortDesc || 'Detailed description coming soon.'}</div>

      <div class="proj-meta-row">
        <span class="proj-meta-chip"><strong>Category:</strong> ${p.category || '—'}</span>
        ${p.location ? `<span class="proj-meta-chip"><strong>Location:</strong> ${p.location}</span>` : ''}
        ${p.year     ? `<span class="proj-meta-chip"><strong>Year:</strong> ${p.year}</span>` : ''}
        ${p.scope    ? `<span class="proj-meta-chip"><strong>Scope:</strong> ${p.scope}</span>` : ''}
      </div>

      <div class="proj-cta-box">
        <h4>Start a Similar Project?</h4>
        <p>Get a free consultation and quote from our engineering team.</p>
        <div class="proj-cta-btns">
          <a href="tel:+918489090666" class="proj-cta-btn">Call Us Now</a>
          <a href="https://wa.me/918489090666?text=Hi, I saw your ${encodeURIComponent(p.title)} project and I'm interested!" target="_blank" class="proj-cta-btn proj-cta-btn-outline">WhatsApp Us</a>
          <a href="index.html#contact" class="proj-cta-btn proj-cta-btn-outline">Get Quote</a>
        </div>
      </div>`;

    // Show body
    document.getElementById('projBody').style.display = 'block';

    // ── LOAD MORE PROJECTS ──
    loadMoreProjects(id);

  } catch(e) {
    showError('Error loading project: ' + e.message);
  }
}

async function loadMoreProjects(currentId) {
  try {
    const snap = await getDocs(query(collection(db,'portfolio'), orderBy('order','asc'), limit(6)));
    const others = snap.docs.filter(d => d.id !== currentId).slice(0,3);
    if (!others.length) { document.getElementById('moreProjSection').style.display = 'none'; return; }

    document.getElementById('moreGrid').innerHTML = others.map(d => {
      const p = d.data();
      return `
        <a href="project.html?id=${d.id}" class="more-card">
          <div class="more-thumb">
            ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.title}"/>` : '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>'}
          </div>
          <div class="more-info">
            <div class="more-cat">${p.category || 'Project'}</div>
            <div class="more-title">${p.title}</div>
          </div>
        </a>`;
    }).join('');
  } catch(e) { document.getElementById('moreProjSection').style.display = 'none'; }
}

function showError(msg) {
  document.getElementById('projHero').innerHTML = `
    <div style="max-width:1100px;margin:0 auto;">
      <div class="page-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>${msg}</p>
        <a href="index.html" style="color:var(--green);font-weight:600;margin-top:12px;display:inline-block;">← Back to Home</a>
      </div>
    </div>`;
}
</script>
