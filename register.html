<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Deepu Siva</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
    .login-box { background: #161b22; padding: 40px; border-radius: 8px; border: 1px solid #21262d; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h2 { font-family: 'Barlow Condensed', sans-serif; color: #f0f6fc; font-size: 32px; margin: 0 0 10px 0; letter-spacing: 1px; }
    p.subtitle { color: #8b949e; margin-bottom: 24px; font-size: 15px; }
    input, textarea { width: 100%; padding: 14px; margin-bottom: 16px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
    input:focus, textarea:focus { outline: none; border-color: #f97316; }
    .row { display: flex; gap: 10px; }
    button { width: 100%; padding: 14px; background: #f97316; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    button:hover { background: #ea580c; }
    button:disabled { background: #555; cursor: not-allowed; }
    .back-link { display: inline-block; margin-top: 20px; color: #8b949e; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #c9d1d9; }
    #message { margin-top: 15px; font-size: 15px; display: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>CLIENT REGISTRATION</h2>
    <p class="subtitle">Apply for your secure project dashboard.</p>
    
    <form id="registerForm">
      <div class="row">
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="lastName" placeholder="Last Name" required>
      </div>
      <input type="text" id="username" placeholder="Desired Username" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <textarea id="address" placeholder="Company / Personal Address" rows="3" required></textarea>
      
      <div style="height: 1px; background: #30363d; margin: 10px 0 25px 0;"></div>
      
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Create Password (min 6 chars)" required minlength="6">
      
      <button type="submit" id="submitBtn">Submit Application →</button>
      <div id="message"></div>
    </form>

    <a href="login.html" class="back-link">← Already have an account? Log In</a>
  </div>

  <script type="module">
    // Import both Authentication AND Firestore this time!
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0",
      authDomain: "deepu-siva-portal.firebaseapp.com",
      projectId: "deepu-siva-portal",
      storageBucket: "deepu-siva-portal.firebasestorage.app",
      messagingSenderId: "1014351018202",
      appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      
      btn.innerText = "Processing...";
      btn.disabled = true;

      try {
        // 1. Create the secure login credentials
        const userCredential = await createUserWithEmailAndPassword(
          auth, 
          document.getElementById('email').value, 
          document.getElementById('password').value
        );
        const user = userCredential.user;

        // 2. Save all the extra profile details to your new Firestore database
        await setDoc(doc(db, "users", user.uid), {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          username: document.getElementById('username').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          email: document.getElementById('email').value,
          status: "pending", // This is the magic word that locks their account until you approve it!
          dateApplied: new Date().toISOString()
        });

        // 3. Show success message
        msg.style.color = "#4ade80"; 
        msg.innerText = "Success! Your application has been sent. Please wait for admin approval before logging in.";
        msg.style.display = "block";
        document.getElementById('registerForm').reset();
        btn.innerText = "Application Submitted";

      } catch (error) {
        msg.style.color = "#ff4d4d"; 
        msg.innerText = "Error: " + error.message;
        msg.style.display = "block";
        btn.innerText = "Submit Application →";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
