<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Director Control Panel | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; background: #161b22; padding: 30px; border-radius: 8px; border: 1px solid #30363d; }
        h1 { color: #f97316; border-bottom: 2px solid #f97316; padding-bottom: 10px; }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }
        .upload-section { margin-top: 30px; padding: 20px; border: 1px dashed #4ade80; border-radius: 8px; }
        button { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #2ea043; }
        #vault-door { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #logMsg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="vault-door">
        <h1 style="color: white; margin-bottom: 20px;">DIRECTOR SECURITY CHECK</h1>
        <input type="text" id="adminID" placeholder="Enter Admin ID" style="width: 250px;">
        <input type="password" id="adminPass" placeholder="Master Password" style="width: 250px;">
        <button id="unlockBtn" style="width: 260px; margin-top: 15px;">Unlock System</button>
    </div>

    <div class="admin-container" id="adminContent" style="display:none;">
        <h1>Director Control Panel</h1>
        <p>Select a client to update their dashboard details.</p>

        <label>Step 1: Select Approved Client</label>
        <select id="clientSelect">
            <option value="">-- Loading Registered Clients --</option>
        </select>

        <div class="upload-section">
            <label>Step 2: What are you uploading?</label>
            <select id="dataType">
                <option value="bills">New Bill / Invoice</option>
                <option value="payments">Payment Status Update</option>
                <option value="sites">New Site Location (Map Link)</option>
                <option value="updates">General Project Update</option>
            </select>

            <label>Title / Description</label>
            <input type="text" id="dataTitle" placeholder="e.g., Invoice #102 or Site B Status">
            
            <label>Detail / Value / Link</label>
            <textarea id="dataValue" rows="3" placeholder="Enter amount, status text, or Google Maps URL"></textarea>

            <div class="input-group" style="margin-top: 20px;">
    <label style="color: #f97316; font-weight: bold; display: block; margin-bottom: 8px;">
        Step 2: Upload PDF Bill (Optional)
    </label>
    <input type="file" id="billFile" accept="application/pdf" 
           style="background: #1a1a1a; color: white; padding: 10px; border: 1px solid #30363d; width: 100%; border-radius: 6px;">
    <p style="font-size: 12px; color: #8b949e; margin-top: 5px;">* Only PDF files are allowed.</p>
</div>
            <button id="uploadBtn">🚀 PUSH TO CLIENT DASHBOARD</button>
        </div>

        <p id="logMsg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
// 📄 ADD THIS LINE BELOW FOR PDF UPLOADS
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJl6mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        // 🏗️ STEP 1: Build the 'app' first! (Move this UP)
const app = initializeApp(firebaseConfig);

// ⛽ STEP 2: Now get the tools from the app
const storage = getStorage(app);
const auth = getAuth(app);
const db = getFirestore(app);

        // --- 🛡️ VAULT LOGIC (Fixed for Modules) ---
        document.getElementById('unlockBtn').addEventListener('click', () => {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;

            if(id === "DEEPU_ADMIN" && pass === "Deepu@2026") { 
                getElementById('vault-door').style.display = "none";
                getElementById('adminContent').style.display = "block";
                loadClients();
            } else {
                alert("ACCESS DENIED: Unauthorized Entrance Attempted.");
            }
        });

        // --- 📋 LOAD CLIENT LIST (Fixed Name Logic) ---
      // --- 📋 LOAD CLIENT LIST (APPROVED ONLY) ---
    async function loadClients() {
        try {
            const select = getElementById('clientSelect');
            select.innerHTML = '<option value="">-- Loading Approved Clients --</option>';
            
            // 🛡️ THE SECURITY FILTER: Only fetch users where status is "approved"
            const q = query(collection(db, "users"), where("status", "==", "approved"));
            const querySnapshot = await getDocs(q);
            
            select.innerHTML = '<option value="">-- Choose a Client --</option>';
            
            if (querySnapshot.empty) {
                select.innerHTML = '<option value="">No Approved Clients Found</option>';
                return;
            }

            querySnapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const option = createElement('option');
                option.value = userDoc.id;
                
                let displayName = data.fullName || 
                                  ((data.firstName || "") + " " + (data.lastName || "")).trim() || 
                                  data.username || 
                                  "Unknown User";
                
                option.text = `${displayName} | ${data.email || 'No Email'} (${data.companyName || 'Individual'})`;
                select.appendChild(option);
            });
        } catch (err) {
            console.error("Error loading clients:", err);
            getElementById('logMsg').innerText = "Error loading list: Check console.";
        }
    }

        // --- 🚀 PUSH DATA LOGIC ---
        getElementById('uploadBtn').addEventListener('click', async () => {
            const clientId = getElementById('clientSelect').value;
            const type = getElementById('dataType').value;
            const title = getElementById('dataTitle').value;
            const value = getElementById('dataValue').value;
            const log = document.getElementById('logMsg');

            if(!clientId || !title || !value) {
                alert("Director, please fill all fields before pushing data.");
                return;
            }

            try {
                const clientRef = doc(db, "users", clientId);
                await updateDoc(clientRef, {
                    [type]: arrayUnion({
                        title: title,
                        detail: value,
                        date: new Date().toLocaleDateString()
                    })
                });

                log.innerText = "✅ Successfully pushed to client dashboard!";
                log.style.color = "#4ade80";
                document.getElementById('dataTitle').value = "";
                document.getElementById('dataValue').value = "";

            } catch (err) {
                log.innerText = "Error: " + err.message;
                log.style.color = "#ff4d4d";
            }
        });
        // --- 🚀 MASTER PUSH LOGIC (Handles Text + PDF) ---
document.getElementById('uploadBtn').addEventListener('click', async () => {
    const selectedClientId = document.getElementById('clientSelect').value;
    const dataType = document.getElementById('dataType').value;
    const title = document.getElementById('dataTitle').value;
    const value = document.getElementById('dataValue').value;
    const file = document.getElementById('billFile').files[0]; // 📄 Grabs the PDF
    const logMsg = document.getElementById('logMsg');

    if (!selectedClientId || !title) {
        alert("Please select a client and enter a title!");
        return;
    }

    logMsg.innerText = "⏳ Processing upload...";
    logMsg.style.color = "white";

    try {
        let fileUrl = "";

        // 1. If a PDF is selected, upload it to Firebase Storage
        if (file) {
            const storageRef = ref(storage, `bills/${selectedClientId}/${Date.now()}_${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            fileUrl = await getDownloadURL(snapshot.ref);
            console.log("File uploaded successfully:", fileUrl);
        }

        // 2. Save everything to Firestore (The user's personal invoice collection)
        await addDoc(collection(db, "users", selectedClientId, "invoices"), {
            title: title,
            detail: value,
            type: dataType,
            billUrl: fileUrl, // 🔗 Links the PDF URL here
            timestamp: serverTimestamp(),
            status: "Unpaid"
        });

        logMsg.style.color = "#4bb543";
        logMsg.innerText = "✅ Successfully pushed to Client Dashboard!";
        
        // Reset form
        document.getElementById('dataTitle').value = "";
        document.getElementById('dataValue').value = "";
        document.getElementById('billFile').value = "";

    } catch (error) {
        console.error("Upload Error:", error);
        logMsg.style.color = "#ff4b2b";
        logMsg.innerText = "❌ Error: " + error.message;
    }
});
    </script>
</body>
</html>
