<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Balance | Deepu Siva Portal</title>
<link rel="stylesheet" href="style.css"/>
<style>
#auth-overlay{position:fixed;inset:0;background:var(--white);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:44px;height:44px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#auth-overlay p{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

.portal-header{background:var(--white);border-bottom:3px solid var(--green);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(22,163,74,.08);}
.portal-header h1{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--green3);text-transform:uppercase;margin:0;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:14px;font-weight:600;text-decoration:none;}

.page-body{max-width:700px;margin:0 auto;padding:28px 24px 100px;}

/* Balance summary card */
.balance-card{background:linear-gradient(150deg,var(--green3),var(--green));border-radius:var(--radius-lg);padding:28px 24px;color:#fff;margin-bottom:28px;position:relative;overflow:hidden;}
.balance-card::before{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;background:rgba(255,255,255,.07);border-radius:50%;}
.balance-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.8;font-weight:600;}
.balance-total{font-family:var(--font-head);font-size:42px;font-weight:800;margin-top:6px;}
.balance-meta{display:flex;gap:24px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.2);}
.balance-meta-item label{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase;display:block;}
.balance-meta-item p{font-size:15px;font-weight:700;margin-top:2px;}

.section-tag-sm{display:inline-block;background:var(--green-light);color:var(--green3);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:20px;}

/* Payment cards */
.payment-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;transition:.2s;}
.payment-card:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(22,163,74,.1);}
.payment-left{}
.payment-date{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.payment-title{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--text);text-transform:uppercase;display:block;margin:4px 0 6px;}
.payment-detail{font-size:13px;color:var(--muted);line-height:1.5;}
.payment-right{text-align:right;flex-shrink:0;}
.payment-amount{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--green);}
.payment-status{display:inline-block;margin-top:6px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state svg{opacity:.3;margin-bottom:12px;}
</style>
</head>
<body>

<div id="auth-overlay"><div class="spinner"></div><p>Verifying session…</p></div>

<header class="portal-header">
  <h1>Payment Balance</h1>
  <a href="dashboard.html" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
</header>

<div class="page-body">

  <!-- Balance Summary -->
  <div class="balance-card" id="balanceCard" style="display:none;">
    <div class="balance-label">Total Project Value</div>
    <div class="balance-total" id="totalAmount">₹0</div>
    <div class="balance-meta">
      <div class="balance-meta-item"><label>Amount Paid</label><p id="paidAmount">₹0</p></div>
      <div class="balance-meta-item"><label>Balance Due</label><p id="dueAmount">₹0</p></div>
      <div class="balance-meta-item"><label>Transactions</label><p id="txnCount">0</p></div>
    </div>
  </div>

  <span class="section-tag-sm">Payment History</span>
  <div id="paymentList"></div>
  <div id="noPayments" class="empty-state" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    <p>No payment records yet.<br/>Your project manager will add them here.</p>
  </div>
</div>

<nav class="app-bottom-nav">
  <a href="index.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Home</span></a>
  <a href="my-bills.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span>Bills</span></a>
  <a href="dashboard.html" class="nav-tab"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span><span>Dashboard</span></a>
  <a href="payments.html" class="nav-tab active"><span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span><span>Payments</span></a>
</nav>

<script type="module">
import { db, requireAuth } from './ds-firebase.js';
import { doc, getDoc, collection, query, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

requireAuth(async (user) => {
  const list  = document.getElementById('paymentList');
  const empty = document.getElementById('noPayments');

  // ── Try subcollection first (new structure from admin panel) ──
  const q = query(
    collection(db, 'users', user.uid, 'payments'),
    orderBy('timestamp', 'desc')
  );

  onSnapshot(q, async (snap) => {
    if (!snap.empty) {
      renderPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })), list, empty);
    } else {
      // Fallback: old array format inside user doc
      try {
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        const payments = userSnap.exists() ? (userSnap.data().payments || []) : [];
        renderPayments([...payments].reverse(), list, empty);
      } catch(e) {
        list.innerHTML = '<p style="color:var(--red);">Error loading payments. Please refresh.</p>';
      }
    }
  });
});

function renderPayments(payments, list, empty) {
  if (!payments.length) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  // Calculate summary
  let total = 0, paid = 0, due = 0;
  payments.forEach(p => {
    const amt = parseFloat(p.amount || 0);
    total += amt;
    if ((p.status || '').toLowerCase().includes('paid')) paid += amt;
    else due += amt;
  });
  if (total > 0) {
    document.getElementById('balanceCard').style.display = 'block';
    document.getElementById('totalAmount').textContent  = '₹' + total.toLocaleString('en-IN');
    document.getElementById('paidAmount').textContent   = '₹' + paid.toLocaleString('en-IN');
    document.getElementById('dueAmount').textContent    = '₹' + due.toLocaleString('en-IN');
    document.getElementById('txnCount').textContent     = payments.length;
  }

  const statusColors = {
    paid:    { bg: 'var(--green-light)', color: 'var(--green3)' },
    unpaid:  { bg: '#fef3c7',           color: '#92400e' },
    pending: { bg: '#dbeafe',           color: '#1e40af' },
    overdue: { bg: '#fee2e2',           color: '#991b1b' },
  };

  list.innerHTML = payments.map(p => {
    const date  = p.timestamp?.toDate?.()
      ? p.timestamp.toDate().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})
      : (p.date || '—');
    const statusKey = (p.status || 'pending').toLowerCase();
    const sc = statusColors[statusKey] || statusColors.pending;
    const amt = parseFloat(p.amount || 0);

    return `
      <div class="payment-card">
        <div class="payment-left">
          <div class="payment-date">${date}</div>
          <span class="payment-title">${p.title || 'Payment Record'}</span>
          <div class="payment-detail">${p.detail || ''}</div>
        </div>
        <div class="payment-right">
          ${amt > 0 ? `<div class="payment-amount">₹${amt.toLocaleString('en-IN')}</div>` : ''}
          <span class="payment-status badge" style="background:${sc.bg};color:${sc.color};display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:6px;">
            ${p.status || 'Pending'}
          </span>
        </div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
