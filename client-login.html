<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Login | Deepu Siva Pvt Ltd</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.login-card {
  background: #ffffff;
  padding: 30px 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

.login-card h1 {
  margin-bottom: 5px;
  font-size: 22px;
  color: #16a34a;
}

.login-card p {
  margin-bottom: 20px;
  font-size: 14px;
  color: #555;
}

.input-group {
  text-align: left;
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #16a34a;
  color: white;
  font-size: 15px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.forgot {
  margin-top: 12px;
  font-size: 13px;
  color: #16a34a;
  cursor: pointer;
  text-decoration: underline;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-card">
  <h1>Deepu Siva</h1>
  <p>Client Portal Login</p>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="client@example.com" required>
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" required>
  </div>

  <button id="loginBtn">Login</button>

  <div class="forgot" id="forgotPassword">Forgot Password?</div>

  <div class="error" id="errorMsg"></div>
</div>

<script type="module">

import { auth } from "./ds-firebase.js";

import {
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const forgotBtn = document.getElementById("forgotPassword");
const errorMsg = document.getElementById("errorMsg");

// 🔁 Auto Redirect if already logged in
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "/dashboard.html";
  }
});

// 🔐 Login
loginBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value.trim();

  errorMsg.textContent = "";

  if (!email || !password) {
    errorMsg.textContent = "Please enter email and password.";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "/dashboard.html";
  } catch (error) {
    errorMsg.textContent = "Invalid login credentials.";
  }
});

// 🔑 Forgot Password
forgotBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim().toLowerCase();

  if (!email) {
    errorMsg.textContent = "Enter your email to reset password.";
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    errorMsg.style.color = "green";
    errorMsg.textContent = "Password reset email sent.";
  } catch (error) {
    errorMsg.style.color = "red";
    errorMsg.textContent = "Error sending reset email.";
  }
});

</script>

</body>
</html>
