<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin: 0; font-size: 24px; }
        .back-link { color: #f97316; text-decoration: none; font-weight: bold; }
        
        .site-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .site-title { color: #4ade80; font-size: 20px; font-weight: bold; display: block; margin-bottom: 10px; }
        .site-desc { font-size: 14px; color: #8b949e; display: block; margin-bottom: 15px; line-height: 1.4; }
        
        .map-btn { 
            background: #f97316; color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; text-decoration: none; display: inline-block; 
            font-weight: bold; font-size: 14px; cursor: pointer;
        }
        .empty-msg { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body style="display:none;" id="mainBody">

    <div class="container">
        <div class="header">
            <h1>SITE LOCATIONS</h1>
            <a href="dashboard.html" class="back-link">← BACK</a>
        </div>

        <div id="siteList">
            </div>

        <div id="noSites" class="empty-msg" style="display:none;">
            <p>No project sites assigned yet.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJ16mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const sites = data.sites || [];
                    const listContainer = document.getElementById('siteList');

                    if (sites.length === 0) {
                        document.getElementById('noSites').style.display = "block";
                    } else {
                        sites.forEach(site => {
                            const card = document.createElement('div');
                            card.className = 'site-card';
                            card.innerHTML = `
                                <span class="site-title">${site.title}</span>
                                <span class="site-desc">${site.detail}</span>
                                <a href="${site.detail}" target="_blank" class="map-btn">📍 OPEN GOOGLE MAPS</a>
                            `;
                            listContainer.appendChild(card);
                        });
                    }
                    document.getElementById('mainBody').style.display = "block";
                }
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
