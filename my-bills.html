<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invoices | Deepu Siva</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin: 0; font-size: 24px; }
        .back-link { color: #f97316; text-decoration: none; font-weight: bold; }
        
        .bill-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bill-info { flex-grow: 1; }
        .bill-date { font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .bill-title { color: #fff; font-size: 18px; font-weight: bold; display: block; margin: 5px 0; }
        .bill-amount { font-size: 16px; color: #4ade80; font-weight: bold; }
        
        .status-badge { background: #238636; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .empty-msg { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body style="display:none;" id="mainBody">

    <div class="container">
        <div class="header">
            <h1>MY INVOICES</h1>
            <a href="dashboard.html" class="back-link">← BACK</a>
        </div>

        <div id="billList">
            </div>

        <div id="noBills" class="empty-msg" style="display:none;">
            <p>No invoices found in your record.</p>
        </div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm0UfXGcDiXk8dmGZ8coKOnnVmaJ16mB0",
            authDomain: "deepu-siva-portal.firebaseapp.com",
            projectId: "deepu-siva-portal",
            storageBucket: "deepu-siva-portal.firebasestorage.app",
            messagingSenderId: "1014351018202",
            appId: "1:1014351018202:web:16d2578f726159e5ef8de3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 🕵️ THE SMART BILLS BOUNCER ---
        onAuthStateChanged(auth, (user) => {
            const bodyTag = document.getElementById('mainBody');

            if (user) {
                console.log("✅ User detected on Bills page:", user.email);
                if (bodyTag) bodyTag.style.display = "block";
                document.body.style.display = "block"; 
            } else {
                console.log("⏳ Session not found. Current Domain:", window.location.hostname);
                
                // Instead of jumping to login, show a message on the white screen
                setTimeout(() => {
                    if (!auth.currentUser) {
                        document.body.innerHTML = `
                            <div style="color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
                                <h2 style="color:orange;">Session Expired or Domain Not Authorized</h2>
                                <p>Checking domain: <b>${window.location.hostname}</b></p>
                                <p>Please <a href="login.html" style="color:cyan;">Login again</a> from this specific domain.</p>
                            </div>
                        `;
                    }
                }, 4000); 
            }
        });
    </script>
</body>
</html>
